{% extends "base.html" %}
{% block content %}

<div class="card p-4">
    <form method="POST">
        {{ form.hidden_tag() }}

        <div class="mb-3">
            {{ form.username.label }}
            {{ form.username(class="form-control") }}
        </div>

        <div class="mb-3">
            {{ form.password.label }}
            {{ form.password(class="form-control") }}
        </div>

        {{ form.submit(class="btn btn-danger") }}
    </form>
</div>

{% endblock %}
